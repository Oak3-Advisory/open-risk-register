name: Security and Build Checks

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  test-and-audit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        run: npm run build

      - name: Verify build is reproducible
        run: |
          git diff --exit-code
          git diff --cached --exit-code

      - name: Run tests
        run: npm test

      - name: Run npm audit
        run: npm audit --audit-level=high

  osv-scan:
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@v2.3.5
    with:
      scan-args: |-
        --lockfile=package-lock.json
