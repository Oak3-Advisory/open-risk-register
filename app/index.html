<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cloud.umami.is; style-src 'self'; img-src 'self' data:; font-src 'self'; connect-src https://cloud.umami.is; object-src 'none'; base-uri 'none'; form-action 'none'; upgrade-insecure-requests">
  <meta name="referrer" content="no-referrer" />
  <title>Risk Assessment Tool &mdash; Open Risk Register</title>
  <meta name="description" content="Run a structured NIS2 cybersecurity risk assessment using the NIST SP 800-30 guided workflow. Free, browser-based, no account required." />
  <meta name="robots" content="noindex, follow" />
  <link rel="canonical" href="https://openriskregister.org/app/" />
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Risk Assessment Tool &mdash; Open Risk Register" />
  <meta property="og:description" content="Free, browser-based NIS2 risk assessment tool based on NIST SP 800-30 R1. No account required." />
  <meta property="og:url" content="https://openriskregister.org/app/" />
  <meta property="og:locale" content="en_US" />
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="Risk Assessment Tool &mdash; Open Risk Register" />
  <meta name="twitter:description" content="Free, browser-based NIS2 risk assessment tool based on NIST SP 800-30 R1." />
  <link rel="stylesheet" href="/dist/style.css" />
  <script defer src="https://cloud.umami.is/script.js" data-website-id="e4cee312-fc99-4004-83c0-1d9c42f04a5f"></script>
</head>
<body>
  <header class="site-header" role="banner">
    <div class="header-inner">
      <a href="/" class="header-brand" aria-label="Open Risk Register &mdash; Home">
        <svg class="header-icon" aria-hidden="true" width="26" height="26" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2L4 6v6c0 5.25 3.5 9.74 8 11 4.5-1.26 8-5.75 8-11V6l-8-4z" fill="currentColor"/>
        </svg>
        <div>
          <span class="header-title">Open Risk Register</span>
          <span class="header-subtitle">NIS2 Risk Assessment Tool</span>
        </div>
      </a>
      <button id="btn-new-assessment" class="btn btn-ghost btn-sm" type="button" aria-label="Return to dashboard">
        Dashboard
      </button>
    </div>
  </header>

  <div id="progress-bar-container" class="progress-bar-container" role="navigation" aria-label="Assessment progress steps">
  </div>

  <main id="main-content" class="main-content" role="main">
    <div id="step-content" class="step-content" aria-live="polite">
    </div>
    <nav class="wizard-nav" aria-label="Step navigation" id="wizard-nav">
    </nav>
  </main>

  <div id="print-region"></div>

  <footer class="site-footer site-footer--dark" role="contentinfo">
    <div class="footer-inner">
      <p>&copy; 2026 Open Risk Register. Developed by <a href="https://oak3.org" rel="noopener noreferrer" target="_blank">Oak3 Advisory B.V.</a></p>
      <p>No data is transmitted to any server. All processing happens in your browser.</p>
    </div>
  </footer>

  <!-- NIST Reference Modal -->
  <dialog id="nist-modal" aria-labelledby="nist-modal-title" aria-modal="true">
    <div class="nist-modal-inner">
      <div class="nist-modal-header">
        <h3 id="nist-modal-title" class="nist-modal-term"></h3>
        <button type="button" id="nist-modal-close" class="btn-icon-close" aria-label="Close">&#x2715;</button>
      </div>
      <div class="nist-modal-body">
        <div class="nist-modal-plain"></div>
        <hr class="nist-modal-divider" />
        <p class="nist-modal-source-label">Source &mdash; verbatim from NIST SP 800-30 Rev. 1</p>
        <blockquote class="nist-modal-quote"></blockquote>
        <p class="nist-modal-cite"></p>
        <a class="nist-modal-link" href="#" target="_blank" rel="noopener noreferrer" hidden></a>
      </div>
    </div>
  </dialog>

  <script src="/dist/bundle.js"></script>
</body>
</html>
